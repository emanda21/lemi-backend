<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Outer leaf shape -->
  <path
    d="M16 2
       C16 2, 28 6, 28 17
       C28 24, 22 29, 16 30
       C10 29, 4 24, 4 17
       C4 6, 16 2, 16 2Z"
    fill="url(#leafGradient)"
  />
  <!-- Midrib (center vein) -->
  <path
    d="M16 28 C16 28, 15 18, 16 4"
    stroke="#166534"
    stroke-width="1.4"
    stroke-linecap="round"
  />
  <!-- Left veins -->
  <path d="M16 22 C13 21, 9 20, 7 17"  stroke="#166534" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
  <path d="M16 17 C13 16, 9 14, 7 12"  stroke="#166534" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
  <path d="M16 12 C14 11, 11 9, 10 7"  stroke="#166534" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
  <!-- Right veins -->
  <path d="M16 22 C19 21, 23 20, 25 17" stroke="#166534" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
  <path d="M16 17 C19 16, 23 14, 25 12" stroke="#166534" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
  <path d="M16 12 C18 11, 21 9, 22 7"  stroke="#166534" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="leafGradient" x1="16" y1="2" x2="16" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#86efac"/>
      <stop offset="50%"  stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
</svg>
